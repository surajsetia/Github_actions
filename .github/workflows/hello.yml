name: My first workflow

on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code # clone repo
        uses: actions/checkout@v4

      - name: list files
        run: ls

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check Node version
        run: node -v

      - name: Download dependencies
        run: npm i 

      - name: Run test
        run: npm run test 
  
